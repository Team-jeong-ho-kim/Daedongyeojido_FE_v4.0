name: Monorepo Build

on:
  push:
    branches: [main, develop]

jobs:
  student:
    name: daedongyeojido
    runs-on: ubuntu-latest
    if: |
      contains(github.event.head_commit.modified, 'apps/student/') ||
      contains(github.event.head_commit.modified, 'packages/')
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter student pages:build

      - name: Deploy to Cloudflare Pages (prod)
        if: github.ref_name == 'main'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/student/.vercel/output/static --project-name=daedongyeojido --branch=main

      - name: Deploy to Cloudflare Pages (stag)
        if: github.ref_name == 'develop'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/student/.vercel/output/static --project-name=daedongyeojido --branch=develop

  admin:
    name: daedongyeojido-admin
    runs-on: ubuntu-latest
    if: |
      contains(github.event.head_commit.modified, 'apps/admin/') ||
      contains(github.event.head_commit.modified, 'packages/')
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter admin pages:build

      - name: Deploy to Cloudflare Pages (prod)
        if: github.ref_name == 'main'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/admin/.vercel/output/static --project-name=daedongyeojido-admin --branch=main

      - name: Deploy to Cloudflare Pages (stag)
        if: github.ref_name == 'develop'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/admin/.vercel/output/static --project-name=daedongyeojido-admin --branch=develop

  teacher:
    name: daedongyeojido-teacher
    runs-on: ubuntu-latest
    if: |
      contains(github.event.head_commit.modified, 'apps/teacher/') ||
      contains(github.event.head_commit.modified, 'packages/')
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter teacher pages:build

      - name: Deploy to Cloudflare Pages (prod)
        if: github.ref_name == 'main'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/teacher/.vercel/output/static --project-name=daedongyeojido-teacher --branch=main

      - name: Deploy to Cloudflare Pages (stag)
        if: github.ref_name == 'develop'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/teacher/.vercel/output/static --project-name=daedongyeojido-teacher --branch=develop

  web:
    name: daedongyeojido-web
    runs-on: ubuntu-latest
    if: |
      contains(github.event.head_commit.modified, 'apps/web/') ||
      contains(github.event.head_commit.modified, 'packages/')
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter web pages:build

      - name: Deploy to Cloudflare Pages (prod)
        if: github.ref_name == 'main'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/web/.vercel/output/static --project-name=daedongyeojido-web --branch=main

      - name: Deploy to Cloudflare Pages (stag)
        if: github.ref_name == 'develop'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/web/.vercel/output/static --project-name=daedongyeojido-web --branch=develop

  notify:
    name: Discord Notify
    runs-on: ubuntu-latest
    needs: [student, admin, teacher, web]
    if: ${{ always() }}
    steps:
      - name: Send Discord notification
        env:
          APP_MAIN_RESULT: ${{ needs.student.result }}
          ADMIN_RESULT: ${{ needs.admin.result }}
          TEACHER_RESULT: ${{ needs.teacher.result }}
          WEB_RESULT: ${{ needs.web.result }}
          BRANCH_NAME: ${{ github.ref_name }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPOSITORY: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          SERVER_URL: ${{ github.server_url }}
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          AVATAR_URL: ${{ github.event.sender.avatar_url }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL secret is not configured. Skipping notification."
            exit 0
          fi

          format_line() {
            APP_NAME="$1"
            RESULT="$2"

            if [ "$RESULT" = "success" ]; then
              printf "✅ %s 빌드 성공" "$APP_NAME"
            elif [ "$RESULT" = "failure" ]; then
              printf "❌ %s 빌드 실패" "$APP_NAME"
            elif [ "$RESULT" = "cancelled" ]; then
              printf "⚪ %s 빌드 취소" "$APP_NAME"
            elif [ "$RESULT" = "skipped" ]; then
              printf "⏭️ %s 스킵" "$APP_NAME"
            else
              printf "⚠️ %s 상태: %s" "$APP_NAME" "$RESULT"
            fi
          }

          APP_MAIN_LINE="$(format_line "daedongyeojido" "$APP_MAIN_RESULT")"
          ADMIN_LINE="$(format_line "daedongyeojido-admin" "$ADMIN_RESULT")"
          TEACHER_LINE="$(format_line "daedongyeojido-teacher" "$TEACHER_RESULT")"
          WEB_LINE="$(format_line "daedongyeojido-web" "$WEB_RESULT")"
          SHORT_SHA="$(printf '%s' "$COMMIT_SHA" | cut -c1-7)"
          COMMIT_URL="$SERVER_URL/$REPOSITORY/commit/$COMMIT_SHA"
          TIMESTAMP="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          DISPLAY_AVATAR_URL="${AVATAR_URL:-https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png}"

          if [ "$APP_MAIN_RESULT" = "failure" ] || [ "$ADMIN_RESULT" = "failure" ] || [ "$TEACHER_RESULT" = "failure" ] || [ "$WEB_RESULT" = "failure" ]; then
            STATUS_TITLE="❌ 모노레포 빌드 실패"
            STATUS_DESCRIPTION="하나 이상의 앱 빌드가 실패했습니다."
            STATUS_COLOR=15158332
          elif [ "$APP_MAIN_RESULT" = "cancelled" ] || [ "$ADMIN_RESULT" = "cancelled" ] || [ "$TEACHER_RESULT" = "cancelled" ] || [ "$WEB_RESULT" = "cancelled" ]; then
            STATUS_TITLE="⚪ 모노레포 빌드 취소"
            STATUS_DESCRIPTION="하나 이상의 앱 빌드가 취소되었습니다."
            STATUS_COLOR=9807270
          else
            STATUS_TITLE="✅ 모노레포 빌드 성공"
            STATUS_DESCRIPTION="모든 앱 빌드가 성공적으로 완료되었습니다."
            STATUS_COLOR=3066993
          fi

          SUMMARY="$(printf '%s\n%s\n%s\n%s' \
            "$APP_MAIN_LINE" \
            "$ADMIN_LINE" \
            "$TEACHER_LINE" \
            "$WEB_LINE")"

          PAYLOAD="$(jq -n \
            --arg title "$STATUS_TITLE" \
            --arg description "$STATUS_DESCRIPTION" \
            --arg repository "$REPOSITORY" \
            --arg branch "$BRANCH_NAME" \
            --arg commit "$SHORT_SHA" \
            --arg commit_url "$COMMIT_URL" \
            --arg actor "$ACTOR" \
            --arg details_url "$RUN_URL" \
            --arg summary "$SUMMARY" \
            --arg commit_message "$COMMIT_MESSAGE" \
            --arg timestamp "$TIMESTAMP" \
            --arg avatar_url "$DISPLAY_AVATAR_URL" \
            --argjson color "$STATUS_COLOR" \
            '{
              username: "CI/CD Alert Bot",
              avatar_url: $avatar_url,
              embeds: [
                {
                  title: $title,
                  description: $description,
                  color: $color,
                  fields: [
                    {name: "Repository", value: $repository, inline: false},
                    {name: "Branch", value: $branch, inline: true},
                    {name: "Commit", value: "[\($commit)](\($commit_url))", inline: true},
                    {name: "Triggered By", value: $actor, inline: true},
                    {name: "Summary", value: $summary, inline: false},
                    {name: "Message", value: $commit_message, inline: false},
                    {name: "Details", value: "[Open GitHub Actions run](\($details_url))", inline: false}
                  ],
                  footer: {text: "Monorepo Build"},
                  timestamp: $timestamp
                }
              ]
            }')"

          curl --fail --show-error --silent \
            -H "Content-Type: application/json" \
            -X POST \
            -d "$PAYLOAD" \
            "$WEBHOOK_URL"