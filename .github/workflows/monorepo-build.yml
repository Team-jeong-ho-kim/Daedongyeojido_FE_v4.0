name: Monorepo Build

on:
  push:
    branches: [main]

jobs:
  app-main:
    name: daedongyeojido
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter student build

  admin:
    name: daedongyeojido-admin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter admin build

  teacher:
    name: daedongyeojido-teacher
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter teacher build

  web:
    name: daedongyeojido-web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter web build

  notify:
    name: Discord Notify
    runs-on: ubuntu-latest
    needs: [app-main, admin, teacher, web]
    if: ${{ always() }}
    steps:
      - name: Send Discord notification
        env:
          APP_MAIN_RESULT: ${{ needs.app-main.result }}
          ADMIN_RESULT: ${{ needs.admin.result }}
          TEACHER_RESULT: ${{ needs.teacher.result }}
          WEB_RESULT: ${{ needs.web.result }}
          BRANCH_NAME: ${{ github.ref_name }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL secret is not configured. Skipping notification."
            exit 0
          fi

          format_line() {
            APP_NAME="$1"
            RESULT="$2"

            if [ "$RESULT" = "success" ]; then
              printf "✅ %s 빌드 성공" "$APP_NAME"
            elif [ "$RESULT" = "failure" ]; then
              printf "❌ %s 빌드 실패" "$APP_NAME"
            elif [ "$RESULT" = "cancelled" ]; then
              printf "⚪ %s 빌드 취소" "$APP_NAME"
            else
              printf "⚠️ %s 상태: %s" "$APP_NAME" "$RESULT"
            fi
          }

          APP_MAIN_LINE="$(format_line "daedongyeojido" "$APP_MAIN_RESULT")"
          ADMIN_LINE="$(format_line "daedongyeojido-admin" "$ADMIN_RESULT")"
          TEACHER_LINE="$(format_line "daedongyeojido-teacher" "$TEACHER_RESULT")"
          WEB_LINE="$(format_line "daedongyeojido-web" "$WEB_RESULT")"

          CONTENT="$(printf '%s\n%s\n%s\n%s\n\n%s\n%s\n%s' \
            "$APP_MAIN_LINE" \
            "$ADMIN_LINE" \
            "$TEACHER_LINE" \
            "$WEB_LINE" \
            "브랜치: $BRANCH_NAME" \
            "커밋: $COMMIT_MESSAGE" \
            "링크: $RUN_URL")"

          PAYLOAD=$(jq -n --arg content "$CONTENT" '{content: $content}')

          curl --fail --show-error --silent \
            -H "Content-Type: application/json" \
            -X POST \
            -d "$PAYLOAD" \
            "$WEBHOOK_URL"
