name: Cloudflare Pages Discord Notify

on:
  check_run:
    types: [completed]
  workflow_dispatch:
    inputs:
      app_name:
        description: Cloudflare Pages app name
        required: true
        default: daedongyeojido
      conclusion:
        description: Deployment result
        required: true
        default: success
        type: choice
        options:
          - success
          - failure
          - cancelled
      branch_name:
        description: Branch name shown in Discord
        required: true
        default: main
      details_url:
        description: Optional details URL shown in Discord
        required: false

permissions:
  contents: read

jobs:
  notify:
    if: >-
      ${{ github.event_name == 'workflow_dispatch' ||
      (startsWith(github.event.check_run.name, 'Cloudflare Pages: ')
      && github.event.check_run.check_suite.head_branch ==
      github.event.repository.default_branch) }}
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord notification
        env:
          EVENT_NAME: ${{ github.event_name }}
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          INPUT_APP_NAME: ${{ inputs.app_name }}
          INPUT_CONCLUSION: ${{ inputs.conclusion }}
          INPUT_BRANCH_NAME: ${{ inputs.branch_name }}
          INPUT_DETAILS_URL: ${{ inputs.details_url }}
          CHECK_NAME: ${{ github.event.check_run.name }}
          CHECK_CONCLUSION: ${{ github.event.check_run.conclusion }}
          CHECK_DETAILS_URL: ${{ github.event.check_run.details_url }}
          CHECK_HTML_URL: ${{ github.event.check_run.html_url }}
          BRANCH_NAME: ${{ github.event.check_run.check_suite.head_branch }}
          COMMIT_SHA: ${{ github.event.check_run.head_sha }}
          REPOSITORY: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ACTOR: ${{ github.actor }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL secret is not configured. Skipping notification."
            exit 0
          fi

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            APP_NAME="$INPUT_APP_NAME"
            RESULT="$INPUT_CONCLUSION"
            DISPLAY_BRANCH="$INPUT_BRANCH_NAME"
            DETAILS_URL="${INPUT_DETAILS_URL:-$RUN_URL}"
            SHA_VALUE="${GITHUB_SHA}"
          else
            APP_NAME="${CHECK_NAME#Cloudflare Pages: }"
            RESULT="$CHECK_CONCLUSION"
            DISPLAY_BRANCH="${BRANCH_NAME:-unknown}"
            DETAILS_URL="${CHECK_DETAILS_URL:-$CHECK_HTML_URL}"
            SHA_VALUE="$COMMIT_SHA"
          fi

          SHORT_SHA="$(printf '%s' "$SHA_VALUE" | cut -c1-7)"
          COMMIT_URL="$SERVER_URL/$REPOSITORY/commit/$SHA_VALUE"

          case "$RESULT" in
            success)
              STATUS_TITLE="✅ 배포 성공"
              STATUS_DESCRIPTION="$APP_NAME 배포가 성공적으로 완료되었습니다."
              STATUS_COLOR=3447003
              ;;
            failure)
              STATUS_TITLE="❌ 배포 실패"
              STATUS_DESCRIPTION="$APP_NAME 배포가 실패했습니다."
              STATUS_COLOR=3447003
              ;;
            cancelled)
              STATUS_TITLE="⚪ 배포 취소"
              STATUS_DESCRIPTION="$APP_NAME 배포가 취소되었습니다."
              STATUS_COLOR=3447003
              ;;
            *)
              STATUS_TITLE="⚠️ 배포 상태 알림"
              STATUS_DESCRIPTION="$APP_NAME 상태: ${RESULT:-unknown}"
              STATUS_COLOR=3447003
              ;;
          esac

          TIMESTAMP="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          PAYLOAD="$(jq -n \
            --arg title "$STATUS_TITLE" \
            --arg description "$STATUS_DESCRIPTION" \
            --arg repository "$REPOSITORY" \
            --arg branch "$DISPLAY_BRANCH" \
            --arg commit "$SHORT_SHA" \
            --arg commit_url "$COMMIT_URL" \
            --arg actor "$ACTOR" \
            --arg details_url "$DETAILS_URL" \
            --arg timestamp "$TIMESTAMP" \
            --arg app_name "$APP_NAME" \
            --argjson color "$STATUS_COLOR" \
            '{
              username: "CI/CD Alert Bot",
              embeds: [
                {
                  title: $title,
                  description: $description,
                  color: $color,
                  fields: [
                    {name: "App", value: $app_name, inline: true},
                    {name: "Repository", value: $repository, inline: false},
                    {name: "Branch", value: $branch, inline: true},
                    {name: "Commit", value: "[\($commit)](\($commit_url))", inline: true},
                    {name: "Triggered By", value: $actor, inline: true},
                    {name: "Details", value: "[Open deployment details](\($details_url))", inline: false}
                  ],
                  footer: {text: "Cloudflare Pages"},
                  timestamp: $timestamp
                }
              ]
            }')"

          curl --fail --show-error --silent \
            -H "Content-Type: application/json" \
            -X POST \
            -d "$PAYLOAD" \
            "$WEBHOOK_URL"
