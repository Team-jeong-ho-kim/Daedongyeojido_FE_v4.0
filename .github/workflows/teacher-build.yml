name: Teacher Build

on:
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/teacher-build.yml"
      - "apps/teacher/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "package.json"
      - ".env.prod"
  pull_request:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/teacher-build.yml"
      - "apps/teacher/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "package.json"
      - ".env.prod"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build teacher app
        working-directory: apps/teacher
        run: pnpm build
